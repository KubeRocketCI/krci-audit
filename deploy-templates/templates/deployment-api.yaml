{{- if .Values.api.enabled }}
{{- $api := include "krci-audit.apiFullname" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $api }}
  labels:
    {{- include "krci-audit.apiLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "krci-audit.apiSelectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "krci-audit.apiSelectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "krci-audit.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: krci-audit-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/krci-audit-api"]
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
              protocol: TCP
          env:
            # Reader connection (audit_reader, SELECT-only). Only the password is a Secret.
            - name: PGHOST
              value: {{ include "krci-audit.dbHost" . | quote }}
            - name: PGPORT
              value: {{ .Values.db.port | quote }}
            - name: PGDATABASE
              value: {{ .Values.db.name | quote }}
            - name: PGSSLMODE
              value: {{ .Values.db.sslmode | quote }}
            - name: PGUSER
              value: "audit_reader"
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "krci-audit.readerSecretName" . }}
                  key: {{ .Values.db.reader.passwordKey }}
            - name: PORT
              value: {{ .Values.api.port | quote }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
