{{- if .Values.api.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "krci-audit.apiFullname" . }}
  labels:
    {{- include "krci-audit.apiLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "krci-audit.apiSelectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.api.port }}
      protocol: TCP
      targetPort: http
{{- end }}
