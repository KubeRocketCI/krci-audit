{{- if and .Values.api.enabled (not .Values.db.reader.secretName) }}
{{- $name := include "krci-audit.readerSecretName" . -}}
{{- $pw := include "krci-audit.persistedPassword" (dict "root" . "secretName" $name "key" .Values.db.reader.passwordKey "explicit" .Values.db.reader.password) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "krci-audit.labels" . | nindent 4 }}
  annotations:
    # Keep the reader password even if the release is uninstalled — losing it strands the
    # audit_reader login until the migration Job re-applies a new one.
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  {{ .Values.db.reader.passwordKey }}: {{ $pw | quote }}
{{- end }}
