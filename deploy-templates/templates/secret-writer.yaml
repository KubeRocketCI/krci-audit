{{- if not .Values.db.writer.secretName }}
{{- $name := include "krci-audit.writerSecretName" . -}}
{{- $pw := include "krci-audit.persistedPassword" (dict "root" . "secretName" $name "key" .Values.db.writer.passwordKey "explicit" .Values.db.writer.password) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "krci-audit.labels" . | nindent 4 }}
  annotations:
    # Keep the writer password even if the release is uninstalled — losing it strands the
    # audit_writer login until the migration Job re-applies a new one.
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  {{ .Values.db.writer.passwordKey }}: {{ $pw | quote }}
{{- end }}
